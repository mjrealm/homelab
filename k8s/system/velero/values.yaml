---
velero:
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.14.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins
  configuration:
    features: EnableCSI
    extraEnvVars:
      - name: TZ
        value: America/Los_Angeles

  snapshotsEnabled: false

  schedules:
    daily-backup:
      schedule: "1 3 * * *"
      template:
        ttl: "168h"  # 7 days
        snapshotVolumes: true
        includedNamespaces:
          - '*'
    weekly-backup:
      schedule: "15 3 * * 0"
      template:
        ttl: "720h"  # 30 days
        snapshotVolumes: true
        includedNamespaces:
          - '*'
    monthly-backup:
      schedule: "30 3 1 * *"
      template:
        ttl: "8760h" # 365 days
        snapshotVolumes: true
        includedNamespaces:
          - '*'
    weekly-backup-r2:
      schedule: "15 4 * * 0"
      template:
        storageLocation: r2
        ttl: "720h"  # 30 days
        snapshotVolumes: true
        includedNamespaces:
          - '*'

  extraObjects:
    - apiVersion: snapshot.storage.k8s.io/v1
      kind: VolumeSnapshotClass
      metadata:
        name: longhorn-velero
        labels:
          velero.io/csi-volumesnapshot-class: "true"
      driver: driver.longhorn.io
      deletionPolicy: Retain
