---
app-template:
  controllers:
    main:
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
        surge: 1
      containers:
        main:
          nameOverride: hermes
          image:
            repository: nousresearch/hermes-agent
            tag: "v2026.7.20"
          env:
            TZ: "America/Los_Angeles"

  service:
    main:
      controller: main
      ports:
        http:
          port: 8642
        dashboard:
          port: 9119

  ingress:
    hermes:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        gethomepage.dev/name: Hermes Agent
        gethomepage.dev/description: AI Agent
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: AI
        gethomepage.dev/icon: sh-hermes-agent.png
        gethomepage.dev/pod-selector: ""
      hosts:
        - host: &hermes hermes.mdeleon.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: dashboard
      tls:
        - secretName: hermes-dashboard-tls-cert
          hosts:
            - *hermes

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      globalMounts:
        - path: /opt/data
