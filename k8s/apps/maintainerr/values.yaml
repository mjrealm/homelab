---
app-template:
  controllers:
    maintainerr:
      strategy: Recreate
      containers:
        maintainerr:
          image:
            repository: ghcr.io/maintainerr/maintainerr
            tag: 3.11.2
          env:
            TZ: America/Los_Angeles

  service:
    maintainerr:
      controller: maintainerr
      ports:
        http:
          port: 6246

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /opt/data
