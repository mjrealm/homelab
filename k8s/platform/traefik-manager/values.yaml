---
app-template:
  controllers:
    traefik-manager:
      replicas: 1
      strategy: Recreate
      containers:
        traefik-manager:
          image:
            repository: ghcr.io/chr0nzz/traefik-manager
            tag: 0.8.0
          env:
            TRAEFIK_API_URL: http://traefik-api.kube-system.svc.cluster.local:8080/api
            COOKIE_SECURE: "true"
            DOMAINS: mdeleon.dev
            TIMEZONE: America/Los_Angeles

  service:
    main:
      controller: traefik-manager
      ports:
        http:
          port: 5000

  ingress:
    main:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Traefik Manager"
        gethomepage.dev/description: "Traefik Web UI"
        gethomepage.dev/group: "System"
        gethomepage.dev/icon: "sh-traefik.png"
      hosts:
        - host: &host traefik-manager.mdeleon.dev
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: traefik-manager-tls-cert
          hosts:
            - *host

  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /app/config
    backups:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /app/backups
