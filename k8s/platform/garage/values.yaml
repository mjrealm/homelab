---
app-template:
  controllers:
    garage:
      replicas: 1
      strategy: Recreate
      pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
      containers:
        garage:
          image:
            repository: dxflrs/garage
            tag: v2.2.0
          env:
            GARAGE_S3_API_BIND_ADDR: "[::]:3900"
            GARAGE_ADMIN_API_BIND_ADDR: "[::]:3903"
            GARAGE_RPC_BIND_ADDR: "[::]:3901"
            GARAGE_METADATA_DIR: /meta
            GARAGE_DATA_DIR: /data
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              memory: 512Mi

    webui:
      replicas: 1
      strategy: Recreate
      containers:
        webui:
          image:
            repository: khairul169/garage-webui
            tag: 1.1.0
          env:
            API_BASE_URL: http://garage:3903
            S3_ENDPOINT_URL: http://garage:3900
            # AUTH_USER_PASS is set in secrets.dec.yaml if needed
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi

  service:
    garage:
      controller: garage
      ports:
        http:
          port: 3900
        admin:
          port: 3903
        rpc:
          port: 3901
    webui:
      controller: webui
      ports:
        http:
          port: 3909

  ingress:
    garage:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &s3 s3.mdeleon.dev
          paths:
            - path: /
              service:
                identifier: garage
                port: http
        - host: "*.s3.mdeleon.dev"
          paths:
            - path: /
              service:
                identifier: garage
                port: http
      tls:
        - secretName: s3-tls-cert
          hosts:
            - *s3
            - "*.s3.mdeleon.dev"
    webui:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.middlewares: tinyauth-tinyauth-forwardauth@kubernetescrd
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Garage S3"
        gethomepage.dev/description: "S3 Compatible Object Storage"
        gethomepage.dev/group: "Storage"
        gethomepage.dev/icon: "sh-garage.svg"  # Assuming standard icon or similar
        gethomepage.dev/pod-selector: "app.kubernetes.io/controller=webui"
      hosts:
        - host: &s3web s3-web.mdeleon.dev
          paths:
            - path: /
              service:
                identifier: webui
                port: http
      tls:
        - secretName: s3web-tls-cert
          hosts:
            - *s3web

  persistence:
    config:
      enabled: true
      type: configMap
      name: garage
      advancedMounts:
        garage:
          garage:
            - path: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
        webui:
          webui:
            - path: /etc/garage.toml
              subPath: garage.toml
              readOnly: true

    metadata:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: longhorn
      advancedMounts:
        garage:
          garage:
            - path: /meta

    data:
      enabled: true
      type: nfs
      server: 192.168.1.200
      path: /volume1/s3
      advancedMounts:
        garage:
          garage:
            - path: /data
