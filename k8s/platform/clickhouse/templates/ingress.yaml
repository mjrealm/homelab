---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clickhouse
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "ClickHouse"
    gethomepage.dev/description: "Data Warehouse"
    gethomepage.dev/group: "Infrastructure"
    gethomepage.dev/icon: "sh-clickhouse.png"
    gethomepage.dev/weight: "5"
spec:
  rules:
    - host: &host "clickhouse.mdeleon.dev"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clickhouse-ui
                port:
                  number: 8123
  tls:
    - secretName: clickhouse-tls-cert
      hosts:
        - *host
