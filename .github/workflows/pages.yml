name: Build and Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install pyyaml mkdocs-material

      - name: Update Documentation
        run: |
          python .github/scripts/update_docs.py

      - name: Commit generated docs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.md
          git commit -m "docs: auto-update apps list and cluster version [skip ci]" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      - name: Deploy MkDocs
        run: mkdocs gh-deploy --force
